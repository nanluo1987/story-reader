<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>故事编辑器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/*===== 全局重置与变量 ===== */
:root {
  --bg:#f5f4f0;
  --surface:       #faf9f6;
  --card:          #ffffff;
  --card-hover:    #fdfcfa;

  --accent:        #c96442;
  --accent-hover:  #b5562f;
  --accent-soft:   rgba(201,100,66,0.10);
  --accent-border: rgba(201,100,66,0.25);

  --danger:        #c0392b;
  --danger-soft:   #fdecea;
  --danger-border: rgba(192,57,43,0.25);

  --green:         #3b7c5e;
  --green-soft:    #eaf3ee;

  --text:          #1c1917;
  --text-dim:      #78716c;
  --text-muted:    #a8a29e;

  --border:        #e5e0d8;
  --border-strong: #cfc8be;

  --tag-bg:        #f0ede8;
  --tag-color:     #6b5e52;
  --tag-border:    #ddd6cc;

  --radius:        12px;
  --radius-sm:     8px;
  --radius-pill:   100px;

  --shadow-sm: 0 1px 3px rgba(28,25,23,0.06), 0 1px 2px rgba(28,25,23,0.04);
  --shadow-md: 0 4px 14px rgba(28,25,23,0.08), 0 2px 6px rgba(28,25,23,0.04);
  --shadow-lg: 0 8px 28px rgba(28,25,23,0.10), 0 4px 10px rgba(28,25,23,0.06);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ===== 顶部导航 ===== */
.top-nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  display: flex;
  align-items: center;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 0 var(--border), 0 2px 8px rgba(28,25,23,0.04);
}

.top-nav .logo {
  font-family: 'Lora', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-right: 40px;
  letter-spacing: -0.01em;
  flex-shrink: 0;
}

.logo-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  background: var(--accent);
  border-radius: 50%;
  margin-left: 3px;
  vertical-align: middle;
  position: relative;
  top: -1px;
}

.nav-tabs {
  display: flex;
  gap: 2px;
}

.nav-tab {
  padding: 8px 18px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all 0.15s;display: flex;
  align-items: center;
  gap: 7px;
}

.nav-tab:hover {
  color: var(--text);
  background: rgba(28,25,23,0.05);
}

.nav-tab.active {
  color: var(--accent);
  background: var(--accent-soft);
}

.nav-tab svg { opacity: 0.75; flex-shrink: 0; }
.nav-tab.active svg { opacity: 1; }

/* ===== 面包屑 ===== */
.breadcrumb {
  padding: 11px 32px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-muted);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.breadcrumb a {
  color: var(--text-dim);
  text-decoration: none;
  cursor: pointer;
  transition: color 0.15s;
}

.breadcrumb a:hover { color: var(--accent); }

.breadcrumb .sep {
  color: var(--border-strong);
  font-size: 12px;
}

.breadcrumb .current {
  color: var(--text);
  font-weight: 500;
}

/* ===== 主内容区 ===== */
.container {
  max-width: 1080px;
  margin: 0 auto;
  padding: 36px 28px;
}

.page-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
}

.page-header h2 {
  font-family: 'Lora', serif;
  font-size: 24px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}

.page-header .count {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 400;
  margin-left: 8px;
}

/* ===== 按钮系统 ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  line-height: 1;
}

.btn:active { transform: scale(0.98); }

.btn svg { flex-shrink: 0; }

.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 1px 4px rgba(201,100,66,0.25);
}

.btn-primary:hover {
  background: var(--accent-hover);
  border-color: var(--accent-hover);box-shadow: 0 2px 8px rgba(201,100,66,0.3);
}

.btn-danger {
  background: var(--danger-soft);
  color: var(--danger);
  border-color: var(--danger-border);
}

.btn-danger:hover {
  background: #f9d5d3;
  border-color: var(--danger);
}

.btn-outline {
  background: var(--card);
  color: var(--text-dim);
  border-color: var(--border);
  box-shadow: var(--shadow-sm);
}

.btn-outline:hover {
  border-color: var(--border-strong);
  color: var(--text);
}

.btn-ghost {
  background: transparent;
  color: var(--text-dim);
  border-color: transparent;
}

.btn-ghost:hover {
  background: rgba(28,25,23,0.05);
  color: var(--text);
}

.btn-sm {
  padding: 6px 13px;
  font-size: 12px;
}

.btn-icon-sq {
  width: 32px;
  height: 32px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: var(--shadow-sm);
  flex-shrink: 0;
}

.btn-icon-sq:hover {
  border-color: var(--danger-border);
  color: var(--danger);
  background: var(--danger-soft);
}

/* ===== 卡片网格 ===== */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 16px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.card::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.2s;
}

.card:hover {
  border-color: var(--border-strong);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.card:hover::after { opacity: 1; }

.card-title {
  font-family: 'Lora', serif;
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 7px;
  color: var(--text);
  letter-spacing: -0.01em;
  padding-right: 28px;
}

.card-meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 10px;
  letter-spacing: 0.01em;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 12px;
}

.card-delete {
  position: absolute;
  top: 14px;
  right: 14px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  width: 26px;
  height: 26px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  opacity: 0;
  cursor: pointer;
  padding: 0;
}

.card:hover .card-delete { opacity: 1; }

.card-delete:hover {
  background: var(--danger-soft);
  color: var(--danger);
}

/* ===== 章节列表 ===== */
.chapter-list {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.chapter-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: var(--shadow-sm);
}

.chapter-item:hover {
  border-color: var(--border-strong);
  box-shadow: var(--shadow-md);transform: translateX(3px);
}

.chapter-info {
  display: flex;
  align-items: center;
  gap: 14px;
  flex: 1;
  min-width: 0;
}

.chapter-num {
  background: var(--accent-soft);
  color: var(--accent);
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  flex-shrink: 0;border: 1px solid var(--accent-border);
  font-variant-numeric: tabular-nums;
}

.chapter-title-text {
  font-weight: 500;
  font-size: 14px;
  color: var(--text);
}

.chapter-preview {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 480px;
}

.chapter-actions {
  display: flex;
  gap: 6px;
  opacity: 0;
  transition: opacity 0.15s;
  flex-shrink: 0;margin-left: 12px;
}

.chapter-item:hover .chapter-actions { opacity: 1; }

/* ===== 标签 ===== */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  background: var(--tag-bg);
  color: var(--tag-color);
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 500;
  border: 1px solid var(--tag-border);
  transition: all 0.15s;
}

.tag-clickable { cursor: pointer; }

.tag-clickable:hover {
  background: var(--accent-soft);
  color: var(--accent);
  border-color: var(--accent-border);
}

.tag-remove {
  cursor: pointer;
  margin-left: 1px;
  font-size: 13px;
  opacity: 0.5;
  line-height: 1;
  font-family: sans-serif;
}

.tag-remove:hover { opacity: 1; color: var(--danger); }

.tags-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag-large {
  padding: 7px 16px;
  font-size: 13px;
}

/* ===== 已有标签选取区 ===== */
.existing-tags-section {
  margin-top: 24px;
  padding-top: 22px;
  border-top: 1px solid var(--border);
}

.existing-tags-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.existing-tags-label svg {
  opacity: 0.6;
}

.tag-selectable {
  cursor: pointer;
  padding: 6px 14px;
  font-size: 12.5px;
  user-select: none;
}

.tag-selectable:hover {
  background: var(--green-soft);
  color: var(--green);
  border-color: rgba(59,124,94,0.25);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

.tag-selectable.tag-already-added {
  opacity: 0.4;
  cursor: default;
  pointer-events: none;
  text-decoration: line-through;
}

/* ===== 编辑器区域 ===== */
.editor-wrapper {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.editor-toolbar {
  display: flex;
  gap: 6px;
  padding: 12px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  align-items: center;
}

.editor-toolbar .toolbar-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 4px;
}

.editor-content {
  width: 100%;
  min-height: 520px;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 16px;
  line-height: 1.9;
  padding: 32px 36px;
  resize: vertical;
  font-family: 'Lora', serif;
  outline: none;
}

.editor-content::placeholder { color: var(--text-muted); font-style: italic; }

.read-content {
  padding: 36px;
  font-family: 'Lora', serif;
  font-size: 16px;
  line-height: 1.95;
  color: var(--text);
  min-height: 520px;
  white-space: pre-wrap;
  word-wrap: break-word;
}

/* ===== 标签编辑面板 ===== */
.tag-editor {
  padding: 28px 36px;
}

.tag-editor-title {
  font-family: 'Lora', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 18px;
}

.tag-input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
}

.tag-input-row input {
  flex: 1;
  padding: 9px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.tag-input-row input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

/* ===== 模态框 ===== */
.modal-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(28,25,23,0.35);
  backdrop-filter: blur(5px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  animation: fadeIn 0.18s ease;
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  width: 90%;
  max-width: 440px;
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.7) inset;
  animation: slideUp 0.22s cubic-bezier(.34,1.56,.64,1);
}

.modal h3 {
  font-family: 'Lora', serif;
  margin-bottom: 20px;
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
}

.modal input {
  width: 100%;
  padding: 11px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  margin-bottom: 20px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  box-shadow: var(--shadow-sm) inset;
}

.modal input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.modal-btns {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ===== 空状态 ===== */
.empty-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--text-muted);
}

.empty-icon {
  width: 48px;
  height: 48px;
  margin: 0 auto 16px;
  opacity: 0.35;
  display: flex;
  align-items: center;
  justify-content: center;
}

.empty-state p {
  font-size: 15px;
  margin-bottom: 24px;line-height: 1.6;
}

/* ===== 搜索结果 ===== */
.result-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: var(--shadow-sm);
}

.result-item:hover {
  border-color: var(--border-strong);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

.result-item .story-name {
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.result-item .chapter-name {
  font-weight: 500;
  font-size: 15px;
  color: var(--text);
}

/* ===== 字数统计 ===== */
.word-count {
  padding: 8px 20px;
  font-size: 12px;
  color: var(--text-muted);
  background: var(--surface);
  border-top: 1px solid var(--border);
  text-align: right;
  letter-spacing: 0.02em;
}

/* ===== 章节标题区 ===== */
.chapter-title-bar {
  padding: 0 36px;
  padding-top: 28px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
}

.chapter-title-bar h2 {
  font-family: 'Lora', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
  padding-bottom: 16px;
}

/* ===== 分隔线 ===== */
.divider { height: 1px; background: var(--border); margin: 24px 0; }

/* ===== 导入导出提示 ===== */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(0);
  background: var(--text);
  color: #fff;
  padding: 10px 22px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  box-shadow: var(--shadow-lg);
  z-index: 300;
  animation: toastIn 0.28s cubic-bezier(.34,1.56,.64,1);
  display: flex;
  align-items: center;
  gap: 8px;
}

.toast svg { flex-shrink: 0; }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(14px) scale(0.96); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
}

/* ===== 隐藏文件输入 ===== */
#import-file-input {
  display: none;
}

/* ===== 响应式 ===== */
@media (max-width: 640px) {
  .container { padding: 20px 14px; }
  .card-grid { grid-template-columns: 1fr; }
  .editor-toolbar { gap: 4px; padding: 10px 14px; }
  .btn { padding: 8px 13px; font-size: 12px; }
  .top-nav .logo { font-size: 16px; margin-right: 20px; }
  .nav-tab { padding: 7px 12px; font-size: 13px; }
  .read-content, .editor-content { padding: 20px; }
  .chapter-title-bar { padding: 20px; }
  .header-actions { flex-wrap: wrap; }
}

/* ===== SVG 图标快捷类 ===== */
.icon-sm { width: 14px; height: 14px; }
.icon-md { width: 16px; height: 16px; }
.icon-lg { width: 20px; height: 20px; }
.icon-xl { width: 40px; height: 40px; }
</style>
</head>
<body>

<nav class="top-nav">
  <div class="logo">
    故事编辑器<span class="logo-dot"></span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchMainTab('stories')"><svg class="icon-md" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="2" width="5" height="12" rx="1"/>
        <rect x="9" y="2" width="5" height="12" rx="1"/></svg>
      故事
    </button>
    <button class="nav-tab" onclick="switchMainTab('tags')">
      <svg class="icon-md" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 8.5L8.5 2H14v5.5L7.5 14a1 1 0 01-1.4 0L2 9.9a1 1 0 010-1.4z"/>
        <circle cx="11.5" cy="4.5" r="1" fill="currentColor" stroke="none"/>
      </svg>
      标签
    </button>
  </div>
</nav>

<input type="file" id="import-file-input" accept=".json">

<div id="breadcrumb-area"></div>
<div id="app" class="container"></div>
<div id="modal-area"></div>
<div id="toast-area"></div>

<script>
// ===== 图标库 =====
const Icons = {
  plus: `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>`,
  x: `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>`,
  back: `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="10,3 4,8 10,13"/></svg>`,

function icon(name, cls ='icon-md') {
  const svg = Icons[name];
  if (!svg) return '';
  return svg.replace('<svg ', `<svg class="${cls}" `);
}

// ===== 数据层 =====
const STORAGE_KEY = 'story_editor_data';

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) try { return JSON.parse(raw); } catch {}
  return { stories: [] };
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let appData = loadData();

// ===== 状态管理 =====
let currentView = 'stories';
let currentStoryId = null;
let currentChapterId = null;
let currentTag = null;
let editorMode = 'read';

// ===== 工具函数 =====
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function getStory(id) { return appData.stories.find(s => s.id === id); }

function getChapter(storyId, chapterId) {
  const story = getStory(storyId);
  return story ? story.chapters.find(c => c.id === chapterId) : null;
}

function getAllTags() {
  const tagSet = new Set();
  appData.stories.forEach(s => {
    s.chapters.forEach(c => { (c.tags || []).forEach(t => tagSet.add(t)); });
  });
  return [...tagSet].sort();
}

function getChaptersByTag(tag) {
  const results = [];
  appData.stories.forEach(s => {
    s.chapters.forEach(c => {
      if ((c.tags || []).includes(tag)) results.push({ story: s, chapter: c });
    });
  });
  return results;
}

// ===== Toast 提示 =====
function showToast(message, iconName = 'check') {
  const toastArea = document.getElementById('toast-area');
  toastArea.innerHTML = `
    <div class="toast">
      ${icon(iconName, 'icon-sm')}
      ${message}
    </div>
  `;
  setTimeout(() => { toastArea.innerHTML = ''; }, 2500);
}

// ===== 导出导入 =====
function exportData() {
  const dataStr = JSON.stringify(appData, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);

  const now = new Date();
  const timestamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
  const filename = `故事编辑器_备份_${timestamp}.json`;

  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showToast('数据已导出到本地文件', 'download');
}

function triggerImport() {
  const input = document.getElementById('import-file-input');
  input.value = '';
  input.click();
}

document.getElementById('import-file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  if (!file.name.endsWith('.json')) {
    alert('请选择 .json 格式的备份文件');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(evt) {
    try {
      const imported = JSON.parse(evt.target.result);

      if (!imported.stories || !Array.isArray(imported.stories)) {
        alert('文件格式不正确，未找到有效的故事数据');
        return;
      }

      const storyCount = imported.stories.length;
      const chapterCount = imported.stories.reduce((sum, s) => sum + (s.chapters ? s.chapters.length : 0), 0);

      if (!confirm(`即将导入 ${storyCount} 个故事、${chapterCount} 个章节。\n\n⚠️ 导入将覆盖当前所有数据，是否继续？`)) {
        return;
      }

      appData = imported;
      saveData(appData);

      currentView = 'stories';
      currentStoryId = null;
      currentChapterId = null;
      currentTag = null;
      render();

      showToast(`成功导入 ${storyCount} 个故事、${chapterCount} 个章节`, 'upload');
    } catch (err) {
      alert('文件解析失败，请确认文件内容正确。\n\n错误信息：' + err.message);
    }
  };
  reader.readAsText(file);
});

// ===== 渲染引擎 =====
const app = document.getElementById('app');
const breadcrumbArea = document.getElementById('breadcrumb-area');
const modalArea = document.getElementById('modal-area');

function render() {
  switch (currentView) {
    case 'stories':     renderStories(); break;
    case 'chapters':    renderChapters(); break;
    case 'editor':      renderEditor(); break;
    case 'tags':        renderTags(); break;
    case 'tag-results': renderTagResults(); break;}
  renderBreadcrumb();
  updateNavTabs();
}

function updateNavTabs() {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const idx = (currentView === 'tags' || currentView === 'tag-results') ? 1 : 0;
  document.querySelectorAll('.nav-tab')[idx].classList.add('active');
}

// ===== 面包屑 =====
function renderBreadcrumb() {
  if (currentView === 'stories' || currentView === 'tags') {
    breadcrumbArea.innerHTML = '';
    return;
  }

  let parts = [];
  if (currentView === 'tag-results') {
    parts.push(`<a onclick="switchMainTab('tags')">标签</a>`);
    parts.push(`<span class="sep">›</span>`);
    parts.push(`<span class="current">${escHtml(currentTag)}</span>`);
  } else {
    const story = getStory(currentStoryId);
    parts.push(`<a onclick="switchMainTab('stories')">故事</a>`);
    if (story) {
      parts.push(`<span class="sep">›</span>`);
      if (currentView === 'chapters') {
        parts.push(`<span class="current">${escHtml(story.title)}</span>`);
      } else {
        parts.push(`<a onclick="goToChapters('${story.id}')">${escHtml(story.title)}</a>`);
        const chapter = getChapter(currentStoryId, currentChapterId);
        if (chapter) {
          parts.push(`<span class="sep">›</span>`);
          parts.push(`<span class="current">${escHtml(chapter.title)}</span>`);
        }
      }
    }
  }

  breadcrumbArea.innerHTML = `<div class="breadcrumb">${parts.join('')}</div>`;
}

// ===== 故事列表 =====
function renderStories() {
  const stories = appData.stories;
  let html = `
    <div class="page-header">
      <h2>我的故事<span class="count">${stories.length}篇</span></h2><div class="header-actions" style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-outline" onclick="triggerImport()">
          ${icon('upload', 'icon-sm')} 导入
        </button>
        <button class="btn btn-outline" onclick="exportData()">
          ${icon('download', 'icon-sm')} 导出
        </button>
        <button class="btn btn-primary" onclick="showAddStoryModal()">
          ${icon('plus', 'icon-sm')} 新建故事
        </button>
      </div>
    </div>
  `;

  if (stories.length === 0) {
    html += `
      <div class="empty-state">
        <div class="empty-icon">${icon('book', 'icon-xl')}</div>
        <p>还没有故事<br>点击右上角按钮开始创作</p>
      </div>
    `;
  } else {
    html += `<div class="card-grid">`;
    stories.forEach(s => {
      const chCount = s.chapters.length;
      const allTags = new Set();
      s.chapters.forEach(c => (c.tags || []).forEach(t => allTags.add(t)));
      const tagsHtml = [...allTags].slice(0, 4).map(t => `<span class="tag">${escHtml(t)}</span>`).join('');
      const totalWords = s.chapters.reduce((sum, c) => sum + (c.content || '').length, 0);

      html += `
        <div class="card" onclick="goToChapters('${s.id}')">
          <button class="card-delete" title="删除故事"onclick="event.stopPropagation(); deleteStory('${s.id}')">
            ${icon('x', 'icon-sm')}
          </button>
          <div class="card-title">${escHtml(s.title)}</div>
          <div class="card-meta">${chCount} 个章节 · ${totalWords.toLocaleString()} 字</div>
          ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
        </div>
      `;
    });
    html += `</div>`;
  }

  app.innerHTML = html;
}

// ===== 章节列表 =====
function renderChapters() {
  const story = getStory(currentStoryId);
  if (!story) { switchMainTab('stories'); return; }

  const chapters = story.chapters;
  let html = `
    <div class="page-header">
      <h2>${escHtml(story.title)}<span class="count">${chapters.length} 章</span></h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline" onclick="switchMainTab('stories')">
          ${icon('back', 'icon-sm')} 返回
        </button>
        <button class="btn btn-primary" onclick="showAddChapterModal()">
          ${icon('plus', 'icon-sm')} 新建章节
        </button>
      </div>
    </div>
  `;

  if (chapters.length === 0) {
    html += `
      <div class="empty-state">
        <div class="empty-icon">${icon('file', 'icon-xl')}</div>
        <p>还没有章节<br>添加第一章开始写作</p>
      </div>
    `;
  } else {
    html += `<div class="chapter-list">`;
    chapters.forEach((c, i) => {
      const preview = (c.content || '').substring(0, 60);
      const tagsHtml = (c.tags || []).map(t => `<span class="tag">${escHtml(t)}</span>`).join('');

      html += `
        <div class="chapter-item" onclick="goToEditor('${c.id}')">
          <div class="chapter-info">
            <div class="chapter-num">${i + 1}</div>
            <div style="min-width:0;flex:1;">
              <div class="chapter-title-text">${escHtml(c.title)}</div>
              <div class="chapter-preview">${preview ? escHtml(preview) + '…' : '暂无内容'}</div>
              ${tagsHtml ? `<div class="card-tags" style="margin-top:7px">${tagsHtml}</div>` : ''}
            </div>
          </div>
          <div class="chapter-actions">
            <button class="btn btn-sm btn-danger"
              onclick="event.stopPropagation(); deleteChapter('${c.id}')">
              ${icon('trash', 'icon-sm')} 删除
            </button>
          </div>
          <div style="margin-left:8px;color:var(--text-muted);flex-shrink:0;">
            ${icon('chevronRight', 'icon-sm')}</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  app.innerHTML = html;
}

// ===== 编辑器 =====
function renderEditor() {
  const chapter = getChapter(currentStoryId, currentChapterId);
  if (!chapter) { goToChapters(currentStoryId); return; }

  const modeBtn = (mode, label, iconName) => `
    <button class="btn btn-sm ${editorMode === mode ? 'btn-primary' : 'btn-ghost'}"
      onclick="setEditorMode('${mode}')">
      ${icon(iconName, 'icon-sm')} ${label}
    </button>
  `;

  const toolbarHtml = `
    <div class="editor-toolbar">
      ${modeBtn('read', '阅读', 'eye')}
      ${modeBtn('edit', '编辑', 'edit')}
      ${modeBtn('tags', '标签', 'tag')}
      <div style="flex:1"></div>
      <span class="toolbar-sep"></span>
      <button class="btn btn-sm btn-ghost" onclick="goToChapters('${currentStoryId}')">
        ${icon('x', 'icon-sm')} 退出
      </button>
    </div>
  `;

  let bodyHtml = '';

  if (editorMode === 'edit') {
    bodyHtml = `
      <textarea class="editor-content" id="editor-textarea"
        placeholder="在此输入正文内容…"
        oninput="autoSaveContent(this.value)">${escHtml(chapter.content || '')}</textarea>
      <div class="word-count" id="word-count">字数：${(chapter.content || '').length}</div>
    `;
  } else if (editorMode === 'read') {
    const content = chapter.content || '';
    if (content.trim()) {
      bodyHtml = `<div class="read-content">${escHtml(content).replace(/\n/g, '<br>')}</div>`;
    } else {
      bodyHtml = `
        <div class="empty-state" style="min-height:420px;display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <div class="empty-icon">${icon('file', 'icon-xl')}</div>
          <p>暂无内容，切换到「编辑」模式开始写作</p>
        </div>
      `;
    }
  } else if (editorMode === 'tags') {
    const tags = chapter.tags || [];
    const tagsHtml = tags.map(t => `
      <span class="tag tag-large">
        ${escHtml(t)}
        <span class="tag-remove" onclick="removeTagFromChapter('${escHtml(t)}')">&times;</span>
      </span>
    `).join('');

    // 获取所有已有标签
    const allTags = getAllTags();
    const chapterTagSet = new Set(tags);

    // 可选标签：所有标签中排除已添加的
    const availableTags = allTags.filter(t => !chapterTagSet.has(t));

    let existingTagsHtml = '';
    if (allTags.length > 0) {
      const tagItems = allTags.map(t => {
        const alreadyAdded = chapterTagSet.has(t);
        if (alreadyAdded) {
          return `<span class="tag tag-selectable tag-already-added">${escHtml(t)}</span>`;
        } else {
          return `<span class="tag tag-selectable" onclick="addExistingTagToChapter('${escHtml(t)}')">${escHtml(t)}</span>`;
        }
      }).join('');

      existingTagsHtml = `
        <div class="existing-tags-section">
          <div class="existing-tags-label">
            ${icon('sparkle', 'icon-sm')}
            从已有标签中选取<span style="color:var(--text-muted);font-weight:400;font-size:12px;margin-left:4px;">
              （点击添加，划线表示已添加）
            </span>
          </div>
          <div class="tags-cloud">
            ${tagItems}
          </div>
        </div>
      `;
    }

    bodyHtml = `
      <div class="tag-editor">
        <div class="tag-editor-title">管理标签</div>
        <div class="tag-input-row">
          <input type="text" id="tag-input" placeholder="输入标签名称，按回车添加"
            onkeydown="if(event.key==='Enter'){addTagToChapter(); event.preventDefault();}">
          <button class="btn btn-primary btn-sm" onclick="addTagToChapter()">
            ${icon('plus', 'icon-sm')} 添加
          </button>
        </div>
        <div class="tags-cloud" style="margin-bottom:4px;">
          ${tagsHtml || `<span style="color:var(--text-muted);font-size:13px;">暂无标签</span>`}
        </div>
        ${existingTagsHtml}
      </div>
    `;
  }

  app.innerHTML = `
    <div class="chapter-title-bar">
      <h2>${escHtml(chapter.title)}</h2>
    </div>
    <div class="editor-wrapper" style="margin-top:0;border-top:none;border-radius:0 0 var(--radius) var(--radius);">
      ${toolbarHtml}
      ${bodyHtml}
    </div>
  `;

  if (editorMode === 'edit') {
    const ta = document.getElementById('editor-textarea');
    if (ta) ta.focus();
  }
  if (editorMode === 'tags') {
    const inp = document.getElementById('tag-input');
    if (inp) inp.focus();
  }
}

// ===== 标签页 =====
function renderTags() {
  const tags = getAllTags();

  let html = `
    <div class="page-header">
      <h2>所有标签<span class="count">${tags.length} 个</span></h2>
    </div>
  `;

  if (tags.length === 0) {
    html += `
      <div class="empty-state">
        <div class="empty-icon">${icon('tag', 'icon-xl')}</div>
        <p>暂无标签<br>在编辑章节时可以添加标签</p>
      </div>
    `;
  } else {
    html += `<div class="tags-cloud">`;
    tags.forEach(t => {
      const count = getChaptersByTag(t).length;
      html += `
        <span class="tag tag-large tag-clickable" onclick="goToTagResults('${escHtml(t)}')">
          ${escHtml(t)}<span style="opacity:0.5;margin-left:5px;font-size:11px;">${count}</span>
        </span>
      `;
    });
    html += `</div>`;
  }

  app.innerHTML = html;
}

// ===== 标签搜索结果 =====
function renderTagResults() {
  const results = getChaptersByTag(currentTag);

  let html = `
    <div class="page-header">
      <h2>
        ${icon('tag', 'icon-md')}
        <span style="margin-left:7px;">${escHtml(currentTag)}</span>
        <span class="count">${results.length} 个章节</span>
      </h2>
      <button class="btn btn-outline" onclick="switchMainTab('tags')">
        ${icon('back', 'icon-sm')} 返回标签
      </button>
    </div>
  `;

  if (results.length === 0) {
    html += `
      <div class="empty-state">
        <div class="empty-icon">${icon('search', 'icon-xl')}</div>
        <p>没有找到包含此标签的章节</p>
      </div>
    `;
  } else {
    results.forEach(r => {
      const preview = (r.chapter.content || '').substring(0, 80);
      html += `
        <div class="result-item" onclick="goToEditorFromTag('${r.story.id}','${r.chapter.id}')">
          <div class="story-name">${escHtml(r.story.title)}</div>
          <div class="chapter-name">${escHtml(r.chapter.title)}</div>
          <div style="margin-top:5px;font-size:13px;color:var(--text-muted);">
            ${preview ? escHtml(preview) + '…' : '暂无内容'}
          </div>
        </div>
      `;
    });
  }

  app.innerHTML = html;
}

// ===== 导航操作 =====
function switchMainTab(tab) {
  if (tab === 'stories') {
    currentView = 'stories'; currentStoryId = null; currentChapterId = null;} else if (tab === 'tags') {
    currentView = 'tags'; currentStoryId = null; currentChapterId = null; currentTag = null;
  }
  render();
}

function goToChapters(storyId) {
  currentView = 'chapters'; currentStoryId = storyId; currentChapterId = null; render();
}

function goToEditor(chapterId) {
  currentView = 'editor'; currentChapterId = chapterId; editorMode = 'read'; render();
}

function goToEditorFromTag(storyId, chapterId) {
  currentStoryId = storyId; currentChapterId = chapterId; currentView = 'editor'; editorMode = 'read'; render();
}

function goToTagResults(tag) {
  currentView = 'tag-results'; currentTag = tag; render();
}

function setEditorMode(mode) { editorMode = mode; render(); }

// ===== 数据操作 =====
function addStory(title) {
  appData.stories.push({ id: genId(), title, chapters: [], createdAt: Date.now() });
  saveData(appData);
}

function deleteStory(id) {
  if (!confirm('确定要删除这个故事及其所有章节吗？')) return;
  appData.stories = appData.stories.filter(s => s.id !== id);
  saveData(appData); render();
}

function addChapter(title) {
  const story = getStory(currentStoryId); if (!story) return;
  story.chapters.push({ id: genId(), title, content: '', tags: [], createdAt: Date.now() });
  saveData(appData);
}

function deleteChapter(chapterId) {
  if (!confirm('确定要删除这个章节吗？')) return;
  const story = getStory(currentStoryId); if (!story) return;
  story.chapters = story.chapters.filter(c => c.id !== chapterId);
  saveData(appData); render();
}

let saveTimer = null;
function autoSaveContent(value) {
  const chapter = getChapter(currentStoryId, currentChapterId); if (!chapter) return;
  chapter.content = value;
  const wc = document.getElementById('word-count');
  if (wc) wc.textContent = `字数：${value.length}  ·  保存中…`;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveData(appData);
    if (wc) wc.textContent = `字数：${value.length}  ·  已保存`;
  }, 500);
}

function addTagToChapter() {
  const input = document.getElementById('tag-input'); if (!input) return;
  const tag = input.value.trim(); if (!tag) return;
  const chapter = getChapter(currentStoryId, currentChapterId); if (!chapter) return;
  if (!chapter.tags) chapter.tags = [];
  if (!chapter.tags.includes(tag)) { chapter.tags.push(tag); saveData(appData); }
  input.value = ''; render();
}

function addExistingTagToChapter(tag) {
  const chapter = getChapter(currentStoryId, currentChapterId); if (!chapter) return;
  if (!chapter.tags) chapter.tags = [];
  if (!chapter.tags.includes(tag)) {
    chapter.tags.push(tag);
    saveData(appData);render();
  }
}

function removeTagFromChapter(tag) {
  const chapter = getChapter(currentStoryId, currentChapterId); if (!chapter) return;
  chapter.tags = (chapter.tags || []).filter(t => t !== tag);
  saveData(appData); render();
}

// ===== 模态框 =====
function showModal(title, placeholder, callback) {
  modalArea.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>${title}</h3>
        <input type="text" id="modal-input" placeholder="${placeholder}"
          onkeydown="if(event.key==='Enter')document.getElementById('modal-confirm').click()">
        <div class="modal-btns">
          <button class="btn btn-outline" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" id="modal-confirm">确定</button>
        </div>
      </div>
    </div>
  `;
  const input = document.getElementById('modal-input');
  const confirmBtn = document.getElementById('modal-confirm');
  setTimeout(() => input.focus(), 80);
  confirmBtn.onclick = () => {
    const value = input.value.trim();
    if (value) { callback(value); closeModal(); }else {
      input.style.borderColor = 'var(--danger)';
      input.style.boxShadow = '0 0 0 3px rgba(192,57,43,0.12)';
      input.placeholder = '请输入内容';
    }
  };
}

function closeModal() { modalArea.innerHTML = ''; }

function showAddStoryModal() {
  showModal('新建故事', '请输入故事标题', (title) => { addStory(title); render(); });
}

function showAddChapterModal() {
  const story = getStory(currentStoryId);
  const nextNum = story ? story.chapters.length + 1 : 1;
  showModal('新建章节', '请输入章节标题', (title) => { addChapter(title); render(); });
  setTimeout(() => {
    const inp = document.getElementById('modal-input');
    if (inp) inp.value = `第${nextNum} 章`;
  }, 50);
}

// ===== 初始化 =====
render();
</script>
